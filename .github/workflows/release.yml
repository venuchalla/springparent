name: Maven Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '19'
          server-id: github



      - name: Build
        run: |
          mvn clean package


      - name: Deploy to GitHub Packages
        run: |
          mvn deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
