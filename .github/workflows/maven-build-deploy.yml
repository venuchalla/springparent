name: Publish Spring Boot to GitHub Packages

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 19
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '19'
          server-id: github


      - name: Show settings.xml
        run: cat ~/.m2/settings.xml

      - name: Build & Deploy
        run: mvn -X clean deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
